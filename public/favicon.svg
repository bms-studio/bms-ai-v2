<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121217"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>

    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="20"
      flood-color="#7C3AED" flood-opacity=".55"/>
    </filter>

  </defs>

  <!-- Background -->

  <rect width="1024" height="1024"
        rx="180"
        fill="url(#bg)"/>

  <!-- Outer Ring -->

  <circle
      cx="512"
      cy="512"
      r="290"
      stroke="url(#purple)"
      stroke-width="10"
      fill="none"
      opacity=".85"/>

  <!-- Main Symbol -->

  <g filter="url(#glow)">

    <!-- Hexagon -->

    <polygon
      points="
      512,250
      715,367
      715,657
      512,774
      309,657
      309,367"
      fill="#111116"
      stroke="url(#purple)"
      stroke-width="8"/>

    <!-- Cube -->

    <polygon
      points="512 340 610 395 512 450 414 395"
      fill="#fff"/>

    <polygon
      points="414 395 512 450 512 570 414 515"
      fill="#8B5CF6"/>

    <polygon
      points="610 395 512 450 512 570 610 515"
      fill="#6D28D9"/>

    <!-- Roblox Inspired Diamond -->

    <g transform="translate(512 515) rotate(45)">
      <rect
        x="-48"
        y="-48"
        width="96"
        height="96"
        rx="12"
        fill="#ffffff"/>

      <rect
        x="-16"
        y="-16"
        width="32"
        height="32"
        fill="#111116"/>
    </g>

  </g>

  <!-- Code -->

  <g
      stroke="url(#purple)"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none">

      <path d="M190 512 L135 560 L190 608"/>

      <path d="M834 512 L889 560 L834 608"/>

      <path d="M485 680 L540 760"/>

  </g>

</svg>